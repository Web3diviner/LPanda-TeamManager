<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Ears -->
  <circle cx="22" cy="28" r="16" fill="#1a1a1a"/>
  <circle cx="78" cy="28" r="16" fill="#1a1a1a"/>
  <circle cx="22" cy="28" r="9" fill="#333"/>
  <circle cx="78" cy="28" r="9" fill="#333"/>

  <!-- Head -->
  <circle cx="50" cy="55" r="38" fill="white"/>
  <circle cx="50" cy="55" r="38" fill="none" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Eye patches -->
  <ellipse cx="34" cy="48" rx="14" ry="13" fill="#1a1a1a"/>
  <ellipse cx="66" cy="48" rx="14" ry="13" fill="#1a1a1a"/>

  <!-- Goggle frames -->
  <rect x="20" y="35" width="28" height="26" rx="8" ry="8" fill="none" stroke="#7c3aed" stroke-width="3.5"/>
  <rect x="52" y="35" width="28" height="26" rx="8" ry="8" fill="none" stroke="#7c3aed" stroke-width="3.5"/>
  <!-- Goggle bridge -->
  <line x1="48" y1="48" x2="52" y2="48" stroke="#7c3aed" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Goggle straps -->
  <line x1="20" y1="48" x2="12" y2="50" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>
  <line x1="80" y1="48" x2="88" y2="50" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>

  <!-- Eyes (white + pupil) -->
  <circle cx="34" cy="48" r="6" fill="white"/>
  <circle cx="66" cy="48" r="6" fill="white"/>
  <circle cx="35" cy="49" r="3.5" fill="#1a1a1a"/>
  <circle cx="67" cy="49" r="3.5" fill="#1a1a1a"/>
  <!-- Eye shine -->
  <circle cx="36.5" cy="47.5" r="1.2" fill="white"/>
  <circle cx="68.5" cy="47.5" r="1.2" fill="white"/>

  <!-- Nose -->
  <ellipse cx="50" cy="63" rx="7" ry="5" fill="#1a1a1a"/>
  <ellipse cx="50" cy="62" rx="4" ry="2.5" fill="#333"/>

  <!-- Mouth -->
  <path d="M 43 70 Q 50 77 57 70" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
</svg>
